<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FlowLocal — Local-first AI voice dictation. Powered by Whisper and Ollama." />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Prevent dragging on non-interactive elements in Tauri -->
    <meta name="tauri:drag-region" content="titlebar" />

    <!-- Preconnect to nothing — we're fully local -->
    <title>FlowLocal</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/32x32.png" />

    <!-- Google Fonts — loaded locally via Tauri asset protocol -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
