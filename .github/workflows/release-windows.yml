name: Release (Windows)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/src/package-lock.json

      - name: Install Node deps
        working-directory: apps/desktop/src
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FlowLocal ${{ github.ref_name }}"
          releaseBody: |
            ## FlowLocal ${{ github.ref_name }}

            ### Windows Installer
            Download `FlowLocal_x64-setup.exe` below.

            ### Requirements
            - Windows 11 (x64)
            - [Ollama](https://ollama.com) installed
            - [Python 3.11+](https://python.org) (for AI services)

            ### First Run
            After installing, run the **Ollama Setup** from the system tray menu.
          releaseDraft: true
          prerelease: false
          projectPath: apps/desktop/src
