name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────────────
  # Rust lint + test
  # ──────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            xdotool

      - name: Rustfmt check
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy -- -D warnings

      - name: Tests
        working-directory: apps/desktop/src-tauri
        run: cargo test --lib

  # ──────────────────────────────────────────────────────────
  # Frontend type check + lint
  # ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/desktop/src

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/src/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

  # ──────────────────────────────────────────────────────────
  # Python lint + test
  # ──────────────────────────────────────────────────────────
  python:
    name: Python (${{ matrix.service }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        service: [whisper, llm, rag]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install service + shared
        run: |
          pip install -e services/shared
          pip install -e "services/${{ matrix.service }}[dev]"

      - name: Ruff lint
        run: ruff check services/${{ matrix.service }}/src

      - name: Tests
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short
        continue-on-error: true   # tests may need mocked hardware
