name: Release (Linux)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux AppImage + Deb
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            xdotool \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/src/package-lock.json

      - name: Install Node deps
        working-directory: apps/desktop/src
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "FlowLocal ${{ github.ref_name }}"
          releaseBody: |
            ## FlowLocal ${{ github.ref_name }} — Linux

            ### Downloads
            - `.AppImage` — portable, runs on any x64 Linux
            - `.deb` — for Debian/Ubuntu
            - `.rpm` — for Fedora/RHEL

            ### Requirements
            - Linux x64
            - [Ollama](https://ollama.com) installed
            - Python 3.11+ with xdotool
          releaseDraft: true
          prerelease: false
          projectPath: apps/desktop/src
